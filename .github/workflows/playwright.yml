name: Playwright Bulk Video Automation

on:
  push:
    branches: [ main, master ]
    paths:
      - 'tsx logic/automation/input.txt'
  workflow_dispatch:

jobs:
  generate-videos:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tsx logic
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm install

    - name: Cache Playwright Browsers
      id: pw-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: pw-chromium-${{ runner.os }}-${{ hashFiles('tsx logic/package.json') }}

    - name: Install Playwright Chromium (browser only)
      if: steps.pw-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium
      timeout-minutes: 5

    - name: Install system dependencies for Chromium
      run: sudo npx playwright install-deps chromium
      timeout-minutes: 3

    - name: Run TSX to Video Automation
      run: xvfb-run --server-args="-screen 0 1920x1080x24 -ac" --auto-servernum -- node automation/recorder.js

    - name: Upload Generated Videos
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: generated-videos
        path: tsx logic/downloads/
        retention-days: 1
        if-no-files-found: warn